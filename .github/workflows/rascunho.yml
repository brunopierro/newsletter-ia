name: Radar de IA — Montar rascunho

on:
  schedule:
    - cron: "0 11 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  rascunho:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Gerar rascunho e enviar prévia
        env:
          MODO: rascunho
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python newsletter.py
      - name: Salvar rascunho no repositório
        run: |
          git config user.name "radar-ia-bot"
          git config user.email "actions@users.noreply.github.com"
          git add drafts editorial
          git commit -m "rascunho ${{ github.run_id }}" || echo "sem mudancas"
          git push
